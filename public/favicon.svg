  <line x1="11" y1="16.5" x2="21" y2="16.5" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
  <!-- Glow/Nodes representing task statuses -->
  <circle cx="16" cy="10" r="2.2" fill="#ffffff" />
  <circle cx="11" cy="16.5" r="2.2" fill="#ffffff" />
  <circle cx="21" cy="16.5" r="2.2" fill="#ffffff" />
