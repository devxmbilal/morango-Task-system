  <line x1="16" y1="10" x2="21" y2="16.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.85" />
  <line x1="11" y1="16.5" x2="16" y2="23" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.85" />
